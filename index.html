<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>ポルテ</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/jpg" href="porte3.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#000000" />

<style>
body, html { margin:0; padding:0; height:100%; overflow:hidden; font-family:sans-serif; background-color:black; }
video { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width:100vw; max-height:100vh; object-fit: contain; z-index:0; background-color:black; display:none; }
.footer { position:absolute; bottom:5%; width:100%; text-align:center; color:white; text-shadow:0 0 10px black; z-index:10; }
button { font-size:1.2em; padding:10px 20px; border:none; border-radius:10px; background-color: rgba(0,0,0,0.6); color:white; cursor:pointer; min-width:140px; min-height:44px; }
.hidden { display:none; }
p { margin-top:10px; font-size:0.9em; line-height:1.4em; }
#log { display:block; position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.6); color:white; padding:5px 10px; font-size:0.8em; border-radius:5px; max-width:90%; word-break:break-word; z-index:10; white-space:pre-line; }
#static-image { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); max-width:100vw; max-height:100vh; z-index:0; display:block; }
#p2-image, #p4-image { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); max-width:100vw; max-height:100vh; z-index:2; display:none; pointer-events:none; }
</style>
</head>
<body>

<img id="static-image" src="porte1.png" alt="静止画">
<img id="p2-image" src="porte2.png" alt="無効ワード" />
<img id="p4-image" src="porte4.png" alt="porte4" />

<video id="p1-video"   src="p1.mp4"   playsinline muted preload="metadata"></video>
<video id="p1rev-video" src="p1rev.mp4" playsinline muted preload="metadata"></video>
<video id="p2-video"   src="p2.mp4"   playsinline muted preload="metadata"></video>
<video id="p3-video"   src="p3.mp4"   playsinline muted preload="metadata"></video>
<video id="p4-video"   src="p4.mp4"   playsinline muted preload="metadata"></video>
<video id="p5-video"   src="p5.mp4"   playsinline muted preload="metadata"></video>
<video id="p6-video"   src="p6.mp4"   playsinline muted preload="metadata"></video>
<video id="p7-video"   src="p7.mp4"   playsinline muted preload="metadata"></video>
<video id="p8-video"   src="p8.mp4"   playsinline muted preload="metadata"></video>
<video id="p9-video"   src="p9.mp4"   playsinline muted preload="metadata"></video>
<video id="p10-video"  src="p10.mp4"  playsinline muted preload="metadata" loop></video>
<video id="p11-video"  src="p11.mp4"  playsinline muted preload="metadata"></video>
<video id="p12-video"  src="p12.mp4"  playsinline muted preload="metadata"></video>
<video id="p13-video"  src="p13.mp4"  playsinline muted preload="metadata"></video>
<video id="p14-video"  src="p14.mp4"  playsinline muted preload="metadata"></video>
<video id="p15-video"  src="p15.mp4"  playsinline muted preload="metadata"></video>
<video id="p16-video"  src="p16.mp4"  playsinline muted preload="metadata"></video>
<video id="p17-video"  src="p17.mp4"  playsinline muted preload="metadata"></video>
<video id="p18-video"  src="p18.mp4"  playsinline muted preload="metadata"></video>
<video id="p19-video"  src="p19.mp4"  playsinline muted preload="metadata"></video>
<video id="p20-video"  src="p20.mp4"  playsinline muted preload="metadata"></video>
<video id="p21-video"  src="p21.mp4"  playsinline muted preload="metadata"></video>
<video id="p22-video"  src="p22.mp4"  playsinline muted preload="metadata"></video>
<video id="p23-video"  src="p23.mp4"  playsinline muted preload="metadata"></video>
<video id="p24-video"  src="p24.mp4"  playsinline muted preload="metadata"></video>
<video id="p25-video"  src="p25.mp4"  playsinline muted preload="metadata"></video>
<video id="p26-video"  src="p26.mp4"  playsinline muted preload="metadata"></video>

<div class="footer">
  <button id="start-btn">▶ スタート</button>
  <p id="start-msg">※押してね</p>
</div>
<div id="log">音声認識待機中...
現在再生: 静止画</div>

<script>
const btn = document.getElementById("start-btn");
const msg = document.getElementById("start-msg");
const log = document.getElementById("log");
const staticImg = document.getElementById("static-image");
const p2Img = document.getElementById("p2-image");
const p4Img = document.getElementById("p4-image");

const videos = {
  p1: document.getElementById("p1-video"),
  p1rev: document.getElementById("p1rev-video"),
  p2: document.getElementById("p2-video"),
  p3: document.getElementById("p3-video"),
  p4: document.getElementById("p4-video"),
  p5: document.getElementById("p5-video"),
  p6: document.getElementById("p6-video"),
  p7: document.getElementById("p7-video"),
  p8: document.getElementById("p8-video"),
  p9: document.getElementById("p9-video"),
  p10: document.getElementById("p10-video"),
  p11: document.getElementById("p11-video"),
  p12: document.getElementById("p12-video"),
  p13: document.getElementById("p13-video"),
  p14: document.getElementById("p14-video"),
  p15: document.getElementById("p15-video"),
  p16: document.getElementById("p16-video"),
  p17: document.getElementById("p17-video"),
  p18: document.getElementById("p18-video"),
  p19: document.getElementById("p19-video"),
  p20: document.getElementById("p20-video"),
  p21: document.getElementById("p21-video"),
  p22: document.getElementById("p22-video"),
  p23: document.getElementById("p23-video"),
  p24: document.getElementById("p24-video"),
  p25: document.getElementById("p25-video"),
  p26: document.getElementById("p26-video")
};

let isListening = false;
let playedP1 = false;
let waitingKeywords = true;
let playingP1rev = false;
let recognition = null;
let logLines = ["音声認識待機中...", "現在再生: 静止画"];
let silenceTimer = null;

function updateLog(newLine){
  logLines.unshift(newLine);
  if(logLines.length>2) logLines.pop();
  log.textContent = logLines.join("\n");
}

async function switchVideo(newVideo, triggeredBy=null){
  staticImg.style.display="none";
  p2Img.style.display="none";
  p4Img.style.display="none";
  newVideo.style.display="block";

  if(newVideo.id==="p2-video" || newVideo.id==="p3-video"){ 
    newVideo.muted=false; 
    newVideo.volume=1.0; 
  } else { 
    newVideo.muted=true; 
    newVideo.volume=0; 
  }

  newVideo.currentTime=0;
  await newVideo.play().catch(()=>{});

  Object.values(videos).forEach(v=>{
    if(v!==newVideo){
      v.pause();
      v.style.display="none";
      v.currentTime=0;
      v.muted=true;
      v.volume=0;
    }
  });

  playingP1rev = (newVideo.id==="p1rev-video");
  const name = newVideo.src.split("/").pop();
  if(triggeredBy) updateLog(`現在再生: ${name} → 認識キーワード: ${triggeredBy}`);
  else updateLog(`現在再生: ${name}`);
}

function setupEndListeners(){
  ['p1','p2','p3','p4','p5','p6','p7','p8','p9','p11','p12','p13','p14','p15','p16','p17','p18','p19','p20','p21','p22','p23','p24','p25','p26'].forEach(key=>{
    videos[key].addEventListener('ended', ()=>{ switchVideo(videos.p10); });
  });

  videos.p1rev.addEventListener('ended', ()=>{
    staticImg.style.display="block";
    waitingKeywords = true;
    playingP1rev = false;
    if(recognition && isListening){ try{ recognition.start(); }catch(e){} }
  });
}
setupEndListeners();

function kanaToHira(str){ return str.replace(/[\u30A1-\u30F6]/g,s=>String.fromCharCode(s.charCodeAt(0)-0x60)); }
function normalizeTranscript(raw){
  let t = raw.trim().toLowerCase();
  t = t.replace(/[ 　]/g,'');
  t = kanaToHira(t);
  t = t.replace(/(です|ます|か)$/,'');
  return t;
}

function initRecognition(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){ alert("このブラウザは音声認識に対応していません。 return;"); return; }
  recognition = new SpeechRecognition();
  recognition.lang='ja-JP';
  recognition.continuous=true;
  recognition.interimResults=false;

  const keywords1 = /(ぽるて|ポルテ|ぽーちゃん|ぽおちゃん|ぽうちゃん|ポーちゃん|おーちゃん|フォーちゃん|こうちゃん|父ちゃん|ふぉるて|フォルテ|来れて|これて|取れて|とれて|降りて|おりて|ポチャン|ぽちゃん)/i;
  const replyKeywords = /(返事|へんじ|お返事|おへんじ)/i;
  const secondReplyKeywords = /(もう一回|もういっかい|もう1回)/i;
  const kawaiiKeywords = /(かわいい|可愛い)/i;
  const sugoiKeywords = /(すごい|凄い)/i;
  const rikouKeywords = /(りこう|利口|お利口|おりこう)/i;
  const sanpoKeywords = /(さんぽ|散歩|お散歩|おさんぽ)/i;
  const oyatsuKeywords = /(おやつ)/i;
  const tanoshiiKeywords = /(たのしい|楽しい|楽しかったね|おいしい|美味しい)/i;
  const byeKeywords = /(またね|おやすみ|じゃあね|じゃーね)/i;
  const oteKeywords = /(おて|お手|大手|おては|お手は|大手は)/i;
  const chuKeywords = /(ちゅう|ちゅー|チュー|チュ|注|中|おはよう|おはよー)/i;
  const iineKeywords = /(いいね|イイネー|いいねー|いいねえ|イイねえ|イイね)/i;
  const genkiKeywords = /(元気|げんき|ゲンキ)/i;
  const gomenKeywords = /(ごめん|ゴメン|ごめんよ|ゴメンよ)/i;
  const sukiKeywords = /(好き|すき|スキ)/i;
  const arigatoKeywords = /(ありがとう|ありがと)/i;
  const dekakeKeywords = /(でかけ|出かけ|おでかけ|お出かけ)/i;
  const doushimasuKeywords = /(どうしますか|どおしますか|どーしますか)/i;
  const iiKeywords = /(いいでしょ|いいでしょう|いいで)/i;
  const douzoKeywords = /(どうぞ|食べて|たべて)/i;
  const choudaiKeywords = /(ちょうだい|頂戴)/i;
  const kamatteKeywords = /(かまって|構って|あそんで|遊んで|あそぶの|遊ぶの)/i;
  const ikunoKeywords = /(いくの|行くの|たべるの|食べるの|食べんの|たべんの|いきたい|行きたい|食べたい|たべたい)/i;
  
  const nakayoshiKeywords = /(なかよし|仲良し)/i;
  const doushitaKeywords = /(どうした|どうしたの)/i;
  const dameKeywords = /(だめ|ダメ|駄目)/i;
  const osshikoKeywords = /(おしっこ|オシッコ)/i;
  const mizuKeywords = /(みず|水|おみず|お水)/i;
  const unchiKeywords = /(うんち|ウンチ)/i;
  const dakkoKeywords = /(だっこ|ダッコ|抱っこ)/i;
  const okawariKeywords = /(おかわり)/i;
  const kiteKeywords = /(きて|来て|着て)/i;
  const oideKeywords = /(おいで)/i;
  const okiteKeywords = /(おきて)/i;
  const hashiruKeywords = /(はしる|走る)/i;
  const jumpKeywords = /(じゃんぷ|ジャンプ)/i;

  function resetSilenceTimer(){
    if(silenceTimer) clearTimeout(silenceTimer);
    silenceTimer = setTimeout(()=>{
      if(isListening){
        try{ recognition.stop(); }catch(e){}
        setTimeout(()=>{ try{ recognition.start(); }catch(e){} }, 200);
        updateLog("無音リセット: 認識再開");
      }
    }, 3000);
  }

  recognition.onresult=async (event)=>{
    resetSilenceTimer();
    const res = event.results[event.results.length-1][0];
    const raw = (res.transcript||"").trim();
    if(!raw) return;
    const normalized = normalizeTranscript(raw);
    updateLog("認識結果: "+raw);
    let matched=false;
    const isP10Visible = (videos.p10.style.display==='block');

    if(waitingKeywords){
      if(keywords1.test(raw)||keywords1.test(normalized)){
        await switchVideo(videos.p1, raw);
        waitingKeywords=false;
        playedP1=true;
        matched=true;
      }
    } else {
      if(douzoKeywords.test(raw) || douzoKeywords.test(normalized)) await switchVideo(videos.p7, raw), matched=true;
      else if(choudaiKeywords.test(raw) || choudaiKeywords.test(normalized)) await switchVideo(videos.p8, raw), matched=true;
      else if(kamatteKeywords.test(raw) || kamatteKeywords.test(normalized)) await switchVideo(videos.p6, raw), matched=true;
      else if(ikunoKeywords.test(raw) || ikunoKeywords.test(normalized)) await switchVideo(videos.p11, raw), matched=true;
      else if(keywords1.test(raw)||keywords1.test(normalized)) await switchVideo(videos.p3, raw), matched=true;
      else if(replyKeywords.test(raw)||replyKeywords.test(normalized)) await switchVideo(videos.p3, raw), matched=true;
      else if(secondReplyKeywords.test(raw)||secondReplyKeywords.test(normalized)) await switchVideo(videos.p2, raw), matched=true;
      else if(kawaiiKeywords.test(raw)||kawaiiKeywords.test(normalized)) await switchVideo(videos.p13, raw), matched=true;
      else if(sugoiKeywords.test(raw)||sugoiKeywords.test(normalized)) await switchVideo(videos.p4, raw), matched=true;
      else if(rikouKeywords.test(raw)||rikouKeywords.test(normalized)) await switchVideo(videos.p4, raw), matched=true;
      else if(sanpoKeywords.test(raw)||sanpoKeywords.test(normalized)) await switchVideo(videos.p12, raw), matched=true;
      else if(oyatsuKeywords.test(raw)||oyatsuKeywords.test(normalized)) await switchVideo(videos.p27, raw), matched=true;
      else if(tanoshiiKeywords.test(raw)||tanoshiiKeywords.test(normalized)) await switchVideo(videos.p4, raw), matched=true;
      else if(byeKeywords.test(raw)||byeKeywords.test(normalized)) await switchVideo(videos.p1rev, raw), playingP1rev=true, matched=true;
      else if(oteKeywords.test(raw)||oteKeywords.test(normalized)) await switchVideo(videos.p9, raw), matched=true;
      else if(chuKeywords.test(raw)||chuKeywords.test(normalized)) await switchVideo(videos.p5, raw), matched=true;
      else if(iineKeywords.test(raw)||iineKeywords.test(normalized)) await switchVideo(videos.p4, raw), matched=true;
      else if(genkiKeywords.test(raw)||genkiKeywords.test(normalized)) await switchVideo(videos.p4, raw), matched=true;
      else if(gomenKeywords.test(raw)||gomenKeywords.test(normalized)) await switchVideo(videos.p4, raw), matched=true;
      else if(sukiKeywords.test(raw)||sukiKeywords.test(normalized)) await switchVideo(videos.p4, raw), matched=true;
      else if(arigatoKeywords.test(raw)||arigatoKeywords.test(normalized)) await switchVideo(videos.p4, raw), matched=true;
      else if(dekakeKeywords.test(raw)||dekakeKeywords.test(normalized)) await switchVideo(videos.p12, raw), matched=true;
      else if(iiKeywords.test(raw)||iiKeywords.test(normalized)) await switchVideo(videos.p4, raw), matched=true;
      else if(nakayoshiKeywords.test(raw)||nakayoshiKeywords.test(normalized)) await switchVideo(videos.p14, raw), matched=true;
      else if(doushitaKeywords.test(raw)||doushitaKeywords.test(normalized)) await switchVideo(videos.p15, raw), matched=true;
      else if(dameKeywords.test(raw)||dameKeywords.test(normalized)) await switchVideo(videos.p16, raw), matched=true;
      else if(osshikoKeywords.test(raw)||osshikoKeywords.test(normalized)) await switchVideo(videos.p17, raw), matched=true;
      else if(mizuKeywords.test(raw)||mizuKeywords.test(normalized)) await switchVideo(videos.p18, raw), matched=true;
      else if(unchiKeywords.test(raw)||unchiKeywords.test(normalized)) await switchVideo(videos.p19, raw), matched=true;
      else if(dakkoKeywords.test(raw)||dakkoKeywords.test(normalized)) await switchVideo(videos.p20, raw), matched=true;
      else if(okawariKeywords.test(raw)||okawariKeywords.test(normalized)) await switchVideo(videos.p21, raw), matched=true;
      else if(kiteKeywords.test(raw)||kiteKeywords.test(normalized)) await switchVideo(videos.p22, raw), matched=true;
      else if(oideKeywords.test(raw)||oideKeywords.test(normalized)) await switchVideo(videos.p23, raw), matched=true;
      else if(okiteKeywords.test(raw)||okiteKeywords.test(normalized)) await switchVideo(videos.p24, raw), matched=true;
      else if(hashiruKeywords.test(raw)||hashiruKeywords.test(normalized)) await switchVideo(videos.p25, raw), matched=true;
      else if(jumpKeywords.test(raw)||jumpKeywords.test(normalized)) await switchVideo(videos.p26, raw), matched=true;
      else if(doushimasuKeywords.test(raw) || doushimasuKeywords.test(normalized)){
        p4Img.style.display = "block";
        updateLog(`認識結果: ${raw} → porte4.png表示`);
        setTimeout(() => {
            p4Img.style.display = "none";
            switchVideo(videos.p10);
        }, 1200);
        matched = true;
      }

      if(!matched && isP10Visible){
        p2Img.style.display="block";
        updateLog(`認識結果: ${raw} → 無効ワード（porte2.png表示）`);
        setTimeout(()=>{ p2Img.style.display="none"; },1200);
        matched=true;
      }
    }

    if(!matched) updateLog("認識結果: "+raw+" → 無視");
  };

  recognition.onerror=(e)=>{
    updateLog("認識エラー: "+e.error);
    if(isListening) setTimeout(()=>{ try{ recognition.start(); }catch(e){} },200);
  };

  recognition.onend=()=>{
    if(isListening) setTimeout(()=>{ try{ recognition.start(); }catch(e){} },200);
  };
}
initRecognition();

btn.addEventListener("click", ()=>{
  if(!recognition) return;
  try{ recognition.start(); }catch(e){}
  isListening=true;
  playedP1=false;
  waitingKeywords=true;
  playingP1rev=false;
  btn.classList.add("hidden");
  msg.classList.add("hidden");
  updateLog("音声認識開始");
});

document.addEventListener('dblclick', ()=>{
  const elem=document.documentElement;
  if(!document.fullscreenElement) elem.requestFullscreen?.();
  else document.exitFullscreen?.();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js')
      .then(reg=>console.log('Service Worker 登録成功:', reg.scope))
      .catch(e=>console.error('Service Worker 登録失敗:', e));
  });
}
</script>

</body>

</html>
